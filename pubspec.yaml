name: femi_friendly
description: "Femi-Friendly - AI-powered menstrual health companion app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5
  google_fonts: ^6.3.0
  table_calendar: ^3.2.0
  http: ^1.2.0
  shared_preferences: ^2.3.2
  fl_chart: ^0.69.0
  intl: ^0.20.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  image_picker: ^0.8.7+5
  dio: ^5.0.0
  url_launcher: ^6.3.1

  # PDF export
  pdf: ^3.11.0
  printing: ^5.13.1

  # Real-time Notifications
  flutter_local_notifications: ^17.0.0
  firebase_core: 4.7.0
  firebase_messaging: 16.2.0
  timezone: ^0.9.4

  # OpenStreetMap Integration
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  geolocator: ^9.0.2

  # Lottie Animations
  lottie: ^3.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
