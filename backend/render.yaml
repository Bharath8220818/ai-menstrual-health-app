services:
  - type: web
    name: femi-friendly-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false
